<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shareable Date Picker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            position: relative;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }
        #emoji-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.15;
            font-size: 2rem;
            line-height: 3.5rem;
            pointer-events: none;
            user-select: none;
            overflow: hidden;
            white-space: normal;
            z-index: -1;
            word-break: break-all;
        }
        h1, p { z-index: 1; }
        h1 {
            color: #ffdf00;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 223, 0, 0.3);
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            z-index: 1;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        label {
            font-size: 0.9rem;
            color: #ffdf00;
            font-weight: bold;
            white-space: nowrap;
        }
        input, select {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #6200ea;
            background: #1e1e2f;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input[type="file"] { display: none; }
        .file-label {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px dashed #00b0ff;
            background: rgba(0, 176, 255, 0.1);
            color: #00b0ff;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        input[type="number"] {
            max-width: 80px;
            text-align: center;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active { transform: scale(0.95); }
        .btn-update {
            background-color: #00b0ff;
            color: #121212;
            border: none;
            padding: 12px 15px;
            border-radius: 25px;
        }
        .btn-add {
            background-color: #00e676;
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
        }
        .btn-share {
            background-color: #ff3d00;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 15px;
            box-shadow: 0 4px 10px rgba(255,61,0,0.3);
        }
        .btn-roll {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(98, 0, 234, 0.4);
            width: 100%;
            margin-bottom: 20px;
        }
        #current-list {
            text-align: left;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 20px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }
        .btn-delete {
            color: #ff5252;
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 0 5px;
        }
        #results {
            margin-top: 20px;
            width: 100%;
        }
        .date-item {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            border-left: 5px solid #ffdf00;
        }
    </style>
</head>
<body>

    <div id="emoji-bg"></div>

    <h1 id="main-title">Custom Picker 🗓️</h1>
    <p>Setup your parameters and generate results</p>
    
    <div class="container">
        <div class="input-group">
            <label>📸 Photo:</label>
            <label for="image-uploader" class="file-label">Choose Image...</label>
            <input type="file" id="image-uploader" accept="image/*">
        </div>

        <div class="input-group">
            <input type="text" id="emoji-input" placeholder="Type background emoji (e.g. 😈)..." maxlength="4">
            <button type="button" class="btn-update" id="emoji-submit-btn">Apply</button>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <div class="input-group">
            <input type="text" id="title-input" placeholder="Change page title...">
            <button type="button" class="btn-update" id="title-submit-btn">Update</button>
        </div>

        <div class="input-group">
            <input type="text" id="button-text-input" placeholder="Change action button text...">
            <button type="button" class="btn-update" id="button-text-btn">Update</button>
        </div>

        <div class="input-group">
            <label for="items-to-select">Results to select:</label>
            <input type="number" id="items-to-select" value="2" min="1">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <div class="input-group">
            <input type="text" id="new-option" placeholder="Add option text...">
            <button type="button" class="btn-add" id="option-submit-btn">Add</button>
        </div>

        <div id="current-list"></div>

        <button type="button" class="btn-share" id="share-btn">🔗 Copy Share Link</button>

        <button type="button" class="btn-roll" id="roll-btn">Choose a Date</button>
    </div>

    <div class="container" style="background: transparent; box-shadow: none; padding: 0;">
        <div id="results"></div>
    </div>

    <script>
        let locations = [];
        let activeEmoji = "";
        let activePhotoBase64 = "";

        // URL ENCODER/DECODER LOGIC FOR SHARING
        function getShareLink() {
            const data = {
                t: document.getElementById("main-title").innerText,
                b: document.getElementById("roll-btn").innerText,
                c: document.getElementById("items-to-select").value,
                l: locations,
                e: activeEmoji,
                p: activePhotoBase64 // Note: Long photo strings may hit URL limits; text/emojis are safest
            };
            const encoded = btoa(encodeURIComponent(JSON.stringify(data)));
            return window.location.origin + window.location.pathname + "?config=" + encoded;
        }

        function loadSharedConfig() {
            const urlParams = new URLSearchParams(window.location.search);
            const configData = urlParams.get('config');
            if (!configData) return;

            try {
                const decoded = JSON.parse(decodeURIComponent(atob(configData)));
                if (decoded.t) document.getElementById("main-title").innerText = decoded.t;
                if (decoded.b) document.getElementById("roll-btn").innerText = decoded.b;
                if (decoded.c) document.getElementById("items-to-select").value = decoded.c;
                if (decoded.l) locations = decoded.l;
                if (decoded.e) {
                    activeEmoji = decoded.e;
                    applyEmojiPattern(activeEmoji);
                }
                if (decoded.p) {
                    activePhotoBase64 = decoded.p;
                    document.body.style.backgroundImage = `url('${activePhotoBase64}')`;
                }
                updateListUI();
            } catch (err) {
                console.error("Failed to parse configurations link", err);
            }
        }

        function applyEmojiPattern(val) {
            const bgLayer = document.getElementById("emoji-bg");
            document.body.style.backgroundImage = "none";
            activePhotoBase64 = "";
            let pattern = "";
            for (let i = 0; i < 600; i++) { pattern += val + " "; }
            bgLayer.innerText = pattern;
        }

        // Photo Handler
        document.getElementById("image-uploader").addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("emoji-bg").innerText = "";
                    activeEmoji = "";
                    activePhotoBase64 = e.target.result;
                    document.body.style.backgroundImage = `url('${activePhotoBase64}')`;
                }
                reader.readAsDataURL(file);
            }
        });

        // Emoji Pattern Handler
        document.getElementById("emoji-submit-btn").addEventListener("click", function() {
            const emojiInput = document.getElementById("emoji-input");
            const val = emojiInput.value.trim();
            if (val !== "") {
                activeEmoji = val;
                applyEmojiPattern(val);
                emojiInput.value = "";
            } else {
                activeEmoji = "";
                document.getElementById("emoji-bg").innerText = "";
            }
        });

        // Share Button Click Hook
        document.getElementById("share-btn").addEventListener("click", function() {
            const link = getShareLink();
            navigator.clipboard.writeText(link).then(() => {
                alert("✨ Link copied to clipboard! Send it to your friend now!");
            }).catch(() => {
                // Fallback for older browsers
                prompt("Copy this link to send to your friend:", link);
            });
        });

        function updateListUI() {
            const listDiv = document.getElementById("current-list");
            if (locations.length === 0) {
                listDiv.innerHTML = "<em>Pool is empty. Add elements above!</em>";
                return;
            }
            listDiv.innerHTML = "<strong>Current Options pool:</strong><br>";
            locations.forEach((loc, index) => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `<span>${loc}</span> <button type="button" class="btn-delete" data-index="${index}">✕</button>`;
                listDiv.appendChild(div);
            });

            const deleteButtons = listDiv.querySelectorAll('.btn-delete');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.getAttribute('data-index'));
                    locations.splice(idx, 1);
                    updateListUI();
                });
            });
        }

        document.getElementById("title-submit-btn").addEventListener("click", function() {
            const titleInput = document.getElementById("title-input");
            if (titleInput.value.trim() !== "") {
                document.getElementById("main-title").innerText = titleInput.value.trim();
                titleInput.value = "";
            }
        });

        document.getElementById("button-text-btn").addEventListener("click", function() {
            const btnInput = document.getElementById("button-text-input");
            if (btnInput.value.trim() !== "") {
                document.getElementById("roll-btn").innerText = btnInput.value.trim();
                btnInput.value = "";
            }
        });

        document.getElementById("option-submit-btn").addEventListener("click", function() {
            const input = document.getElementById("new-option");
            if (input.value.trim() !== "") {
                locations.push(input.value.trim());
                input.value = "";
                updateListUI();
            }
        });

        document.getElementById("roll-btn").addEventListener("click", function() {
            const resultDiv = document.getElementById("results");
            resultDiv.innerHTML = "";
            let targetCount = parseInt(document.getElementById("items-to-select").value) || 1;

            if (locations.length < 1) {
                resultDiv.innerHTML = "<div class='date-item' style='border-left-color: #ff5252;'>Add options to your pool first!</div>";
                return;
            }

            const selectedIndices = new Set();
            const maxToSelect = Math.min(targetCount, locations.length);
            while (selectedIndices.size < maxToSelect) {
                selectedIndices.add(Math.floor(Math.random() * locations.length));
            }

            selectedIndices.forEach(index => {
                const p = document.createElement("div");
                p.className = "date-item";
                p.innerText = locations[index];
                resultDiv.appendChild(p);
            });
        });

        // Initialize UI and parse shared setups if existing
        loadSharedConfig();
        if (locations.length === 0) updateListUI();
    </script>
</body>
</html>
