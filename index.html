<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Picker</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1e1e2f;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        #emoji-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            opacity: 0.15; font-size: 2rem; line-height: 3.5rem;
            pointer-events: none; z-index: -1; overflow: hidden;
            word-break: break-all; white-space: normal;
        }
        .container {
            width: 100%; max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 15px;
            margin: 20px auto; box-sizing: border-box;
        }
        .input-group {
            display: flex; gap: 10px; margin-bottom: 15px; align-items: center;
        }
        label { font-size: 0.9rem; width: 110px; text-align: left; }
        input, select { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #6200ea; }
        input[type="number"] { max-width: 70px; text-align: center; }
        button { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; }
        .btn-update { background-color: #00b0ff; }
        .btn-add { background-color: #00e676; }
        .btn-roll { background-color: #6200ea; color: white; width: 100%; font-size: 1.2rem; padding: 15px; }
        #current-list { text-align: left; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 15px; }
        .list-item { display: flex; justify-content: space-between; padding: 5px 0; }
        .btn-delete { color: #ff5252; background: none; }
        .date-item { background: rgba(255,255,255,0.2); padding: 15px; margin: 10px 0; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="emoji-bg"></div>

    <h1 id="main-title">Custom Picker 🗓️</h1>
    
    <div class="container">
        <div class="input-group">
            <label>🎨 Theme:</label>
            <select id="color-dropdown">
                <option value="#1e1e2f">Space Blue</option>
                <option value="#2c003e">Midnight Purple</option>
                <option value="#4a0e17">Vampire Red</option>
                <option value="#0b3c1b">Emerald Green</option>
                <option value="#111111">Pitch Black</option>
            </select>
        </div>

        <div class="input-group">
            <label>✨ Background:</label>
            <select id="emoji-select">
                <option value="">None</option>
                <option value="😈">😈 Devil</option>
                <option value="⚡">⚡ Lightning</option>
                <option value="❤️">❤️ Hearts</option>
            </select>
        </div>

        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">

        <div class="input-group">
            <input type="text" id="title-input" placeholder="Change title...">
            <button type="button" class="btn-update" id="title-submit-btn">Update</button>
        </div>

        <div class="input-group">
            <input type="text" id="button-text-input" placeholder="Change button text...">
            <button type="button" class="btn-update" id="button-text-btn">Update</button>
        </div>

        <div class="input-group">
            <label style="flex:1;">Results to select:</label>
            <input type="number" id="items-to-select" value="2" min="1">
        </div>

        <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:15px 0;">

        <div class="input-group">
            <input type="text" id="new-option" placeholder="Add option text...">
            <button type="button" class="btn-add" id="option-submit-btn">Add</button>
        </div>

        <div id="current-list"></div>

        <button type="button" class="btn-roll" id="roll-btn">Choose a Date</button>
    </div>

    <div class="container" style="background:transparent; box-shadow:none;">
        <div id="results"></div>
    </div>

    <script>
        let locations = [];

        document.getElementById("color-dropdown").addEventListener("change", function() {
            document.body.style.backgroundColor = this.value;
        });

        document.getElementById("emoji-select").addEventListener("change", function() {
            const bgLayer = document.getElementById("emoji-bg");
            if (!this.value) { bgLayer.innerText = ""; return; }
            let pattern = "";
            for (let i = 0; i < 600; i++) { pattern += this.value + " "; }
            bgLayer.innerText = pattern;
        });

        function updateListUI() {
            const listDiv = document.getElementById("current-list");
            if (locations.length === 0) {
                listDiv.innerHTML = "<em>Pool is empty. Add elements above!</em>";
                return;
            }
            listDiv.innerHTML = "<strong>Current Options pool:</strong><br>";
            locations.forEach((loc, index) => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `<span>${loc}</span> <button type="button" class="btn-delete" data-index="${index}">✕</button>`;
                listDiv.appendChild(div);
            });

            const deleteButtons = listDiv.querySelectorAll('.btn-delete');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.getAttribute('data-index'));
                    locations.splice(idx, 1);
                    updateListUI();
                });
            });
        }

        document.getElementById("title-submit-btn").addEventListener("click", function() {
            const titleInput = document.getElementById("title-input");
            if (titleInput.value.trim() !== "") {
                document.getElementById("main-title").innerText = titleInput.value.trim();
                titleInput.value = "";
            }
        });

        document.getElementById("button-text-btn").addEventListener("click", function() {
            const btnInput = document.getElementById("button-text-input");
            if (btnInput.value.trim() !== "") {
                document.getElementById("roll-btn").innerText = btnInput.value.trim();
                btnInput.value = "";
