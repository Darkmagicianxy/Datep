<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date Picker</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e2f; /* Fixed: Raw background-color property so color picker works */
            position: relative;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-x: hidden;
        }
        /* Custom Emoji Background layer */
        #emoji-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            opacity: 0.09; /* Slightly boosted opacity so you can see it better on mobile */
            font-size: 2rem;
            line-height: 3.5rem;
            pointer-events: none;
            user-select: none;
            overflow: hidden;
            white-space: normal;
            z-index: -1;
            word-break: break-all;
        }
        h1 {
            color: #ffdf00;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 223, 0, 0.3);
            z-index: 1;
        }
        p {
            z-index: 1;
        }
        .container {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px); /* Safari support */
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 20px;
            z-index: 1;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        label {
            font-size: 0.9rem;
            color: #ffdf00;
            font-weight: bold;
            white-space: nowrap;
        }
        input, select {
            flex: 1;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #6200ea;
            background: #1e1e2f;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        input[type="color"] {
            padding: 0;
            height: 45px;
            max-width: 60px;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid #6200ea;
        }
        input[type="number"] {
            max-width: 80px;
            text-align: center;
        }
        button {
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
        .btn-update {
            background-color: #00b0ff;
            color: #121212;
            border: none;
            padding: 12px 15px;
            border-radius: 25px;
        }
        .btn-add {
            background-color: #00e676;
            color: #121212;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
        }
        .btn-roll {
            background-color: #6200ea;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(98, 0, 234, 0.4);
            width: 100%;
            margin-bottom: 20px;
        }
        #current-list {
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 20px;
        }
        .list-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            align-items: center;
        }
        .btn-delete {
            color: #ff5252;
            background: none;
            border: none;
            font-size: 1.1rem;
            padding: 0 5px;
        }
        #results {
            margin-top: 20px;
            width: 100%;
        }
        .date-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(5px);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 1.3rem;
            font-weight: bold;
            border-left: 5px solid #ffdf00;
        }
    </style>
</head>
<body>

    <div id="emoji-bg"></div>

    <h1 id="main-title">Custom Picker 🗓️</h1>
    <p>Setup your parameters and generate results</p>
    
    <div class="container">
        <div class="input-group">
            <label for="color-picker">🎨 Theme Color:</label>
            <input type="color" id="color-picker" value="#1e1e2f">
        </div>

        <div class="input-group">
            <label for="emoji-select">✨ Background Pattern:</label>
            <select id="emoji-select">
                <option value="">None</option>
                <option value="😈">😈 Devil</option> <option value="⚡">⚡ Lightning</option>
                <option value="🌸">🌸 Flowers</option>
                <option value="🍿">🍿 Popcorn</option>
                <option value="🎬">🎬 Movies</option>
                <option value="❤️">❤️ Hearts</option>
                <option value="🎲">🎲 Dice</option>
                <option value="✨">✨ Sparkles</option>
            </select>
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <div class="input-group">
            <input type="text" id="title-input" placeholder="Change page title...">
            <button type="button" class="btn-update" id="title-submit-btn">Update</button>
        </div>

        <div class="input-group">
            <input type="text" id="button-text-input" placeholder="Change action button text...">
            <button type="button" class="btn-update" id="button-text-btn">Update</button>
        </div>

        <div class="input-group">
            <label for="items-to-select">Results to select:</label>
            <input type="number" id="items-to-select" value="2" min="1">
        </div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 15px;">

        <div class="input-group">
            <input type="text" id="new-option" placeholder="Add option text...">
            <button type="button" class="btn-add" id="option-submit-btn">Add</button>
        </div>

        <div id="current-list"></div>

        <button type="button" class="btn-roll" id="roll-btn">Choose a Date</button>
    </div>

    <div class="container" style="background: transparent; box-shadow: none; padding: 0;">
        <div id="results"></div>
    </div>

    <script>
        let locations = [];

        // Color Picker Event Listener Hook - Updated to force style application
        document.getElementById("color-picker").addEventListener("input", function() {
            document.body.style.backgroundColor = this.value;
        });

        // Emoji Selector Background Generator Hook
        document.getElementById("emoji-select").addEventListener("change", function() {
            const bgLayer = document.getElementById("emoji-bg");
            const emoji = this.value;
            
            if (!emoji) {
                bgLayer.innerText = "";
                return;
            }
            
            let pattern = "";
            for (let i = 0; i < 600; i++) {
                pattern += emoji + " ";
            }
            bgLayer.innerText = pattern;
        });

        function updateListUI() {
            const listDiv = document.getElementById("current-list");
            
            if (locations.length === 0) {
                listDiv.innerHTML = "<em>Pool is empty. Add elements above!</em>";
                return;
            }
            
            listDiv.innerHTML = "<strong>Current Options pool:</strong><br>";
            
            locations.forEach((loc, index) => {
                const div = document.createElement("div");
                div.className = "list-item";
                div.innerHTML = `<span>${loc}</span> <button type="button" class="btn-delete" data-index="${index}">✕</button>`;
                listDiv.appendChild(div);
            });

            const deleteButtons = listDiv.querySelectorAll('.btn-delete');
            deleteButtons.forEach(btn => {
                btn.addEventListener('click', function() {
                    const idx = parseInt(this.getAttribute('data-index'));
                    locations.splice(idx, 1);
                    updateListUI();
                });
            });
        }

        document.getElementById("title-submit-btn").addEventListener("click", function() {
            const titleInput = document.getElementById("title-input");
            const mainTitle = document.getElementById("main-title");
            if (titleInput.value.trim() !== "") {
                mainTitle.innerText = titleInput.value.trim();
                titleInput.value = "";
            }
        });

        document.getElementById("button-text-btn").addEventListener("click", function() {
            const btnInput = document.getElementById("button-text-input");
            const rollBtn = document.getElementById("roll-btn");
            if (btnInput.value.trim() !== "") {
                rollBtn.innerText = btnInput.value.trim();
                btnInput.value = "";
            }
        });

        document.getElementById("option-submit-btn").addEventListener("click", function() {
            const input = document.getElementById("new-option");
            const value = input.value.trim();
            if (value !== "") {
                locations.push(value);
                input.value = "";
                updateListUI();
            }
        });

        document.getElementById("roll-btn").addEventListener("click", function() {
            const resultDiv = document.getElementById("results");
            const selectCountInput = document.getElementById("items-to-select");
            resultDiv.innerHTML = "";

            let targetCount = parseInt(select
